<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Só amigos e família</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <div class="perfil">
            <img src="foto.jpg" alt="Sua Foto de Perfil" class="foto-perfil">

            <h1>Mural Particular</h1>
            <p>Só para os chegados do Insta, Face e Zap!</p>
        </div>
    </header>

    <main>
        <div class="boas-vindas">
            <h2>E aí, tudo certo? 🤙</h2>
            <p>Criei esse cantinho pra gente trocar uma ideia sem a bagunça dos comentários públicos. Manda um alô!</p>
        </div>

        <form action="https://formspree.io/f/xkoqlvye" method="POST" class="caixa-mensagem">
            <div class="campo">
                <input type="text" name="nome" placeholder="Seu nome ou apelido..." required>
            </div>
            
            <div class="campo">
                <textarea name="mensagem" rows="4" placeholder="Manda o papo aqui..." required></textarea>
            </div>

            <button type="submit">Enviar Mensagem Privada 🚀</button>
        </form>

    </main>

    <footer>
        <p>Feito com ❤️ para meus amigos e família.</p>
    </footer>

</body>
</html>
